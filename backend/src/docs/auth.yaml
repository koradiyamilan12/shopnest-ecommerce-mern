paths:
  /api/auth/register:
    post:
      summary: Register a new user
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegisterInput'
      responses:
        201:
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
                  status:
                    type: object
                  message:
                    type: string
        400:
          description: Validation error / email already exists
  /api/auth/login:
    post:
      summary: Login a user
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLoginInput'
      responses:
        200:
          description: User logged in successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
                  status:
                    type: object
                  message:
                    type: string
        400:
          description: Invalid validation
        401:
          description: Invalid email or password
  /api/auth/logout:
    post:
      summary: Logout current user (clears cookie)
      tags:
        - Auth
      responses:
        200:
          description: Logged out successfully
  /api/auth/me:
    get:
      summary: Get profile of logged-in user
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        200:
          description: User profile fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
                  status:
                    type: object
                  message:
                    type: string
        401:
          description: Unauthorized / Token missing or invalid
  /api/auth/users:
    get:
      summary: Get all users (Admin only)
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        200:
          description: Users fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  status:
                    type: object
                  message:
                    type: string
        401:
          description: Unauthorized
        403:
          description: Forbidden (Admin access required)
  /api/auth/google:
    get:
      summary: Initiate Google OAuth login flow
      tags:
        - Auth
      responses:
        302:
          description: Redirects to Google login
  /api/auth/google/callback:
    get:
      summary: Google OAuth callback redirect
      tags:
        - Auth
      responses:
        302:
          description: Redirects to frontend google-success with session cookie set

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        avatar:
          type: string
          nullable: true
        authProvider:
          type: string
          enum: [local, google]
        role:
          type: string
          enum: [user, admin]
        token:
          type: string
          description: JWT Authentication token
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    UserRegisterInput:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
          example: John Doe
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          minLength: 6
          example: password123
    UserLoginInput:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          example: password123
