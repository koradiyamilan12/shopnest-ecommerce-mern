paths:
  /api/analytics:
    get:
      summary: Get admin dashboard statistics (Admin only)
      tags:
        - Analytics
      security:
        - bearerAuth: []
      responses:
        200:
          description: Analytics data fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      totalSales:
                        type: number
                        example: 15420.50
                      totalOrders:
                        type: integer
                        example: 124
                      totalUsers:
                        type: integer
                        example: 45
                      totalProducts:
                        type: integer
                        example: 22
                      monthlySales:
                        type: array
                        items:
                          type: object
                          properties:
                            month:
                              type: string
                              example: "Jul 26"
                            revenue:
                              type: number
                              example: 1200.00
                  status:
                    type: object
                  message:
                    type: string
        401:
          description: Unauthorized
        403:
          description: Forbidden (Admin access required)
