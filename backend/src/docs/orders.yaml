paths:
  /api/orders:
    post:
      summary: Create a new order
      tags:
        - Orders
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreateInput'
      responses:
        201:
          description: Order created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Order'
                  status:
                    type: object
                  message:
                    type: string
        400:
          description: Invalid input / validation error
        401:
          description: Unauthorized
    get:
      summary: Get all orders (Admin only)
      tags:
        - Orders
      security:
        - bearerAuth: []
      responses:
        200:
          description: Orders fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'
                  status:
                    type: object
                  message:
                    type: string
        401:
          description: Unauthorized
        403:
          description: Forbidden
  /api/orders/myorders:
    get:
      summary: Get logged-in user's orders
      tags:
        - Orders
      security:
        - bearerAuth: []
      responses:
        200:
          description: Orders fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'
                  status:
                    type: object
                  message:
                    type: string
        401:
          description: Unauthorized
  /api/orders/{id}/status:
    put:
      summary: Update order status (Admin only)
      tags:
        - Orders
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Order ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [Pending, Shipped, Delivered]
                  example: Shipped
      responses:
        200:
          description: Order status updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Order'
                  status:
                    type: object
                  message:
                    type: string
        400:
          description: Invalid status or validation error
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: Order not found

components:
  schemas:
    Order:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        totalAmount:
          type: number
        address:
          $ref: '#/components/schemas/ShippingAddress'
        paymentId:
          type: string
          nullable: true
        status:
          type: string
          enum: [Pending, Shipped, Delivered]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    OrderItem:
      type: object
      required:
        - productId
        - qty
        - price
      properties:
        productId:
          type: integer
        qty:
          type: integer
        price:
          type: number
    ShippingAddress:
      type: object
      required:
        - fullName
        - street
        - city
        - postalCode
        - country
      properties:
        fullName:
          type: string
          example: Jane Doe
        street:
          type: string
          example: 123 Main St
        city:
          type: string
          example: Boston
        postalCode:
          type: string
          example: 02108
        country:
          type: string
          example: USA
    OrderCreateInput:
      type: object
      required:
        - items
        - totalAmount
        - address
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        totalAmount:
          type: number
          example: 250.00
        address:
          $ref: '#/components/schemas/ShippingAddress'
        paymentId:
          type: string
          example: pay_123456 (optional)
