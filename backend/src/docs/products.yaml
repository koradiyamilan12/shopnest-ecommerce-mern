paths:
  /api/products:
    get:
      summary: Get all products
      tags:
        - Products
      responses:
        200:
          description: Products fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
                  status:
                    type: object
                  message:
                    type: string
    post:
      summary: Create a new product (Admin only)
      tags:
        - Products
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - name
                - description
                - price
                - category
                - stock
              properties:
                name:
                  type: string
                  example: Premium Wireless Headphones
                description:
                  type: string
                  example: High-quality sound with active noise cancellation.
                price:
                  type: number
                  example: 199.99
                category:
                  type: string
                  example: Electronics
                stock:
                  type: integer
                  example: 50
                image:
                  type: string
                  format: binary
                  description: Product image file
      responses:
        201:
          description: Product created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Product'
                  status:
                    type: object
                  message:
                    type: string
        400:
          description: Invalid input or validation error
        401:
          description: Unauthorized
        403:
          description: Forbidden (Admin access required)
  /api/products/{id}:
    get:
      summary: Get a product by ID
      tags:
        - Products
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Product ID
      responses:
        200:
          description: Product fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Product'
                  status:
                    type: object
                  message:
                    type: string
        404:
          description: Product not found
    put:
      summary: Update a product by ID (Admin only)
      tags:
        - Products
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Product ID
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Updated Headphones
                description:
                  type: string
                  example: Updated description
                price:
                  type: number
                  example: 179.99
                category:
                  type: string
                  example: Electronics
                stock:
                  type: integer
                  example: 45
                image:
                  type: string
                  format: binary
                  description: New product image file (optional)
      responses:
        200:
          description: Product updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Product'
                  status:
                    type: object
                  message:
                    type: string
        400:
          description: Invalid input or validation error
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: Product not found
    delete:
      summary: Delete a product by ID (Admin only)
      tags:
        - Products
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Product ID
      responses:
        200:
          description: Product deleted successfully
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: Product not found

components:
  schemas:
    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        price:
          type: number
        category:
          type: string
        stock:
          type: integer
        imageUrl:
          type: string
        ratings:
          type: number
        numReviews:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
