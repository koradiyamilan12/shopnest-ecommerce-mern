<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Welcome to ShopNest</title>
  <style>
    body {
      font-family: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f8fafc;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      max-width: 600px;
      margin: 40px auto;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03);
      overflow: hidden;
      border: 1px solid #f1f5f9;
    }
    .header {
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      padding: 40px 20px;
      text-align: center;
      color: #ffffff;
    }
    .header h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .content {
      padding: 40px 30px;
      color: #334155;
      line-height: 1.6;
    }
    .content h2 {
      color: #0f172a;
      margin-top: 0;
    }
    .content p {
      margin: 0 0 20px;
      font-size: 16px;
    }
    .footer {
      background-color: #f8fafc;
      padding: 24px;
      text-align: center;
      font-size: 14px;
      color: #64748b;
      border-top: 1px solid #e2e8f0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>ShopNest</h1>
    </div>
    <div class="content">
      <h2>Welcome {{name}} 🎉</h2>
      <p>Thank you for joining ShopNest. We're thrilled to have you here!</p>
      <p>Explore our wide range of products and enjoy an amazing shopping experience.</p>
    </div>
    <div class="footer">
      &copy; 2026 ShopNest E-commerce. All rights reserved.
    </div>
  </div>
</body>
</html>
